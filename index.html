<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Saul 22</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
    background: black;
}

/* INTRO */
.intro {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    flex-direction: column;
    background: radial-gradient(circle, #000000, #1a1a1a);
}

.intro h1 {
    font-size: 2rem;
    animation: fade 2s infinite alternate;
}

@keyframes fade {
    from {opacity: 0.4;}
    to {opacity: 1;}
}

/* MAIN */
.main {
    position: absolute;
    width: 100%;
    height: 100vh;
    background: linear-gradient(135deg, red, white);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    opacity: 0;
    transition: 1.5s;
}

/* NEON */
.neon {
    font-size: 2.5rem;
    text-align: center;
    color: white;
    animation: neon 1.5s infinite alternate;
}

@keyframes neon {
    from { text-shadow: 0 0 10px #fff, 0 0 20px red; }
    to { text-shadow: 0 0 30px #fff, 0 0 60px red; }
}

/* BOTON */
.btn {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: black;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

/* PERSONAJES */
.character {
    position: absolute;
    width: 90px;
    animation: float 5s infinite ease-in-out;
}

@keyframes float {
    50% { transform: translateY(-50px); }
}

/* CONFETI */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

</style>
</head>

<body>

<div class="intro" onclick="start()">
    <h1>🎂 ¿Listo para algo épico?</h1>
    <p>(toca la pantalla)</p>
</div>

<div class="main" id="main">
    <div class="neon">🔥 ¡Feliz Cumpleaños Saul! 🔥<br>22 años... ¡WOW!</div>
    <button class="btn" onclick="location.reload()">Repetir</button>
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
function start() {

    document.querySelector(".intro").style.display = "none";
    document.getElementById("main").style.opacity = "1";

    // MUSICA
    let music = document.getElementById("music");
    music.play();

    // VOZ
    let voz = new SpeechSynthesisUtterance("Feliz cumpleaños Saul, que tengas un día increíble");
    voz.lang = "es-MX";
    speechSynthesis.speak(voz);

    // PERSONAJES
    const personajes = [
        "https://media.giphy.com/media/NOalcASHiOGvC/giphy.gif",
        "https://media.giphy.com/media/GRSnxyhJnPsaQy9YLn/giphy.gif",
        "https://media.giphy.com/media/3o7TKtnuHOHHUjR38Y/giphy.gif",
        "https://media.giphy.com/media/12XDYvMJNcmLgQ/giphy.gif"
    ];

    for (let i = 0; i < 25; i++) {
        let img = document.createElement("img");
        img.src = personajes[Math.floor(Math.random() * personajes.length)];
        img.classList.add("character");

        img.style.top = Math.random() * 90 + "%";
        img.style.left = Math.random() * 90 + "%";

        document.body.appendChild(img);
    }

    // CONFETI
    for (let i = 0; i < 150; i++) {
        let c = document.createElement("div");
        c.classList.add("confetti");

        c.style.left = Math.random() * 100 + "%";
        c.style.background = ["red","white","yellow"][Math.floor(Math.random()*3)];
        c.style.animationDuration = (Math.random()*3+2)+"s";

        document.body.appendChild(c);
    }
}
</script>

</body>
</html>
